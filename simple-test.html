<!DOCTYPE html>
<html>
<head>
    <title>Simple Cesium Test</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
    <div id="cesium-container" style="width: 100%; height: 500px;"></div>
    <button onclick="addTestAircraft()">Add Test Aircraft</button>
    <button onclick="addRealData()">Load Real Data</button>
    <div id="log" style="margin-top: 10px; font-family: monospace; background: black; color: green; padding: 10px;"></div>

    <script>
        // Set Cesium token
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5NTQ2N2RmOC1lYjczLTQyMDgtOWEzMy04NDY2YWU3ZjdiNWYiLCJpZCI6NDAzNTA5LCJpYXQiOjE3NzM0ODEzMTJ9.UmgxGBCO1zYXaIg9iO6eoJ3LdpAXLTUBliDFwuoCjZs';
        
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            console.log(message);
        }
        
        log('Starting Cesium viewer...');
        
        const viewer = new Cesium.Viewer('cesium-container', {
            animation: false,
            baseLayerPicker: false,
            fullscreenButton: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            sceneModePicker: false,
            selectionIndicator: false,
            timeline: false,
            navigationHelpButton: false
        });
        
        // Set camera to NYC
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(-74.006, 40.7128, 2000000)
        });
        
        log('✅ Cesium viewer initialized');
        
        function addTestAircraft() {
            log('Adding test aircraft...');
            
            const entity = viewer.entities.add({
                id: 'test_aircraft_1',
                position: Cesium.Cartesian3.fromDegrees(-74.006, 40.7128, 35000 * 0.3048), // NYC, 35k feet
                point: {
                    pixelSize: 15,
                    color: Cesium.Color.CYAN,
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 2,
                    heightReference: Cesium.HeightReference.NONE
                },
                label: {
                    text: 'TEST AIRCRAFT\nNYC\n35,000ft',
                    font: '12px Courier New',
                    fillColor: Cesium.Color.CYAN,
                    outlineColor: Cesium.Color.BLACK,
                    outlineWidth: 2,
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -20)
                }
            });
            
            log('✅ Test aircraft added');
            
            // Fly to the aircraft
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(-74.006, 40.7128, 100000),
                duration: 3.0
            });
        }
        
        async function addRealData() {
            log('Attempting to load real ShadowBroker data...');
            
            try {
                // Try to fetch from ShadowBroker
                const response = await fetch('http://localhost:8000/api/live-data/fast', {
                    mode: 'cors'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log(`✅ Data loaded: ${data.tracked_flights?.length || 0} aircraft`);
                
                if (data.tracked_flights && data.tracked_flights.length > 0) {
                    // Add first few aircraft
                    const aircraftToShow = data.tracked_flights.slice(0, 5);
                    
                    aircraftToShow.forEach((aircraft, index) => {
                        if (aircraft.lng && aircraft.lat) {
                            const entity = viewer.entities.add({
                                id: `real_aircraft_${index}`,
                                position: Cesium.Cartesian3.fromDegrees(
                                    aircraft.lng, 
                                    aircraft.lat, 
                                    (aircraft.alt || 35000) * 0.3048
                                ),
                                point: {
                                    pixelSize: 12,
                                    color: Cesium.Color.YELLOW,
                                    outlineColor: Cesium.Color.RED,
                                    outlineWidth: 2,
                                    heightReference: Cesium.HeightReference.NONE
                                },
                                label: {
                                    text: `${aircraft.callsign || 'UNKNOWN'}\\n${aircraft.alert_category || 'Unknown'}\\n${Math.round(aircraft.alt || 0)}ft`,
                                    font: '10px Courier New',
                                    fillColor: Cesium.Color.YELLOW,
                                    outlineColor: Cesium.Color.BLACK,
                                    outlineWidth: 1,
                                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                                    pixelOffset: new Cesium.Cartesian2(0, -15)
                                }
                            });
                            
                            log(`✅ Added: ${aircraft.callsign} (${aircraft.alert_category})`);
                        }
                    });
                    
                    // Fly to first aircraft
                    const firstAircraft = aircraftToShow[0];
                    if (firstAircraft.lng && firstAircraft.lat) {
                        viewer.camera.flyTo({
                            destination: Cesium.Cartesian3.fromDegrees(
                                firstAircraft.lng, 
                                firstAircraft.lat, 
                                100000
                            ),
                            duration: 3.0
                        });
                    }
                } else {
                    log('⚠️ No aircraft data found');
                }
                
            } catch (error) {
                log(`❌ Failed to load data: ${error.message}`);
                log('🔧 This might be a CORS issue. ShadowBroker needs CORS headers.');
            }
        }
        
        log('Ready! Click buttons to test aircraft display.');
    </script>
</body>
</html>
