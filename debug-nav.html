<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Debug</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .search-panel { margin: 20px 0; display: flex; gap: 10px; }
        .search-input { background: #002200; border: 1px solid #00ff00; color: #00ff00; padding: 8px; }
        .search-btn, .location-btn { background: #004400; border: 1px solid #00ff00; color: #00ff00; padding: 8px 12px; cursor: pointer; }
        .coordinates-panel { background: #001100; border: 1px solid #00ff00; padding: 15px; margin: 20px 0; }
        .coord-row { display: flex; justify-content: space-between; margin: 5px 0; }
        .coord-label { color: #00ff00; font-weight: bold; }
        .coord-value { color: #ccffcc; }
        #cesium-container { width: 100%; height: 400px; border: 2px solid #00ff00; }
        .test-btn { background: #004400; border: 1px solid #00ff00; color: #00ff00; padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.119/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
    <h1>🛰️ WORLDVIEW NAVIGATION DEBUG</h1>
    
    <div class="search-panel">
        <input type="text" id="address-search" placeholder="Search address or coordinates..." class="search-input">
        <button id="search-btn" class="search-btn">🔍</button>
        <button id="my-location-btn" class="location-btn">📍</button>
    </div>
    
    <div class="coordinates-panel">
        <div class="coord-row">
            <span class="coord-label">Lat:</span>
            <span id="current-lat" class="coord-value">---.-----</span>
        </div>
        <div class="coord-row">
            <span class="coord-label">Lon:</span>
            <span id="current-lon" class="coord-value">---.-----</span>
        </div>
        <div class="coord-row">
            <span class="coord-label">Alt:</span>
            <span id="current-alt" class="coord-value">--- km</span>
        </div>
    </div>
    
    <div>
        <button class="test-btn" onclick="testSearch()">Test Search</button>
        <button class="test-btn" onclick="testLocation()">Test Location</button>
        <button class="test-btn" onclick="testCoordinates()">Test Coordinates</button>
    </div>
    
    <div id="cesium-container"></div>
    
    <div id="log" style="background: #001100; border: 1px solid #00ff00; padding: 10px; margin-top: 20px; height: 150px; overflow-y: scroll;"></div>

    <script>
        let viewer;
        
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        // Initialize Cesium
        try {
            Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5NTQ2N2RmOC1lYjczLTQyMDgtOWEzMy04NDY2YWU3ZjdiNWYiLCJpZCI6NDAzNTA5LCJpYXQiOjE3NzM0ODEzMTJ9.UmgxGBCO1zYXaIg9iO6eoJ3LdpAXLTUBliDFwuoCjZs';
            
            viewer = new Cesium.Viewer('cesium-container', {
                animation: false,
                baseLayerPicker: false,
                fullscreenButton: false,
                geocoder: false,
                homeButton: false,
                infoBox: false,
                sceneModePicker: false,
                selectionIndicator: false,
                timeline: false,
                navigationHelpButton: false
            });
            
            viewer.camera.setView({
                destination: Cesium.Cartesian3.fromDegrees(-74.006, 40.7128, 2000000)
            });
            
            log('✅ Cesium initialized');
            
            // Setup coordinate tracking
            viewer.camera.changed.addEventListener(() => {
                updateCoordinatesDisplay();
            });
            
            updateCoordinatesDisplay();
            
        } catch (error) {
            log('❌ Cesium failed: ' + error.message);
        }
        
        // Test functions
        function testSearch() {
            const query = document.getElementById('address-search').value || 'London';
            log(`🔍 Testing search for: ${query}`);
            performAddressSearch(query);
        }
        
        function testLocation() {
            log('📍 Testing current location...');
            getCurrentLocation();
        }
        
        function testCoordinates() {
            log('📊 Testing coordinate display...');
            updateCoordinatesDisplay();
        }
        
        // Address search
        async function performAddressSearch(query) {
            try {
                log(`Searching for: ${query}`);
                
                // Check for coordinates
                const coordMatch = query.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
                if (coordMatch) {
                    const lat = parseFloat(coordMatch[1]);
                    const lon = parseFloat(coordMatch[2]);
                    
                    if (lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
                        flyToCoordinates(lat, lon, 'Coordinates');
                        return;
                    }
                }
                
                // Geocoding search
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const results = await response.json();
                
                if (results.length > 0) {
                    const result = results[0];
                    const lat = parseFloat(result.lat);
                    const lon = parseFloat(result.lon);
                    
                    flyToCoordinates(lat, lon, result.display_name);
                } else {
                    log('❌ Location not found');
                }
                
            } catch (error) {
                log(`❌ Search error: ${error.message}`);
            }
        }
        
        // Fly to coordinates
        function flyToCoordinates(lat, lon, locationName) {
            if (!viewer) return;
            
            log(`🎯 Flying to: ${locationName} (${lat.toFixed(4)}, ${lon.toFixed(4)})`);
            
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(lon, lat, 15000),
                duration: 3.0
            });
            
            // Add marker
            viewer.entities.removeAll();
            viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(lon, lat, 100),
                point: {
                    pixelSize: 15,
                    color: Cesium.Color.LIME,
                    outlineColor: Cesium.Color.BLACK,
                    outlineWidth: 3,
                    heightReference: Cesium.HeightReference.CLAMP_TO_GROUND
                },
                label: {
                    text: locationName,
                    font: '12px Arial',
                    fillColor: Cesium.Color.LIME,
                    outlineColor: Cesium.Color.BLACK,
                    outlineWidth: 2,
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -20)
                }
            });
        }
        
        // Current location
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                log('❌ Geolocation not supported');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = Math.round(position.coords.accuracy);
                    
                    log(`✅ Got location: ${lat.toFixed(4)}, ${lon.toFixed(4)} (±${accuracy}m)`);
                    flyToCoordinates(lat, lon, `Current Location (±${accuracy}m)`);
                },
                (error) => {
                    log(`❌ Location error: ${error.message}`);
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }
        
        // Update coordinates display
        function updateCoordinatesDisplay() {
            if (!viewer) return;
            
            try {
                const cameraPosition = viewer.camera.positionWC;
                const cartographic = Cesium.Cartographic.fromCartesian(cameraPosition);
                
                const lat = Cesium.Math.toDegrees(cartographic.latitude);
                const lon = Cesium.Math.toDegrees(cartographic.longitude);
                const alt = cartographic.height / 1000;
                
                document.getElementById('current-lat').textContent = lat.toFixed(5);
                document.getElementById('current-lon').textContent = lon.toFixed(5);
                document.getElementById('current-alt').textContent = alt.toFixed(1) + ' km';
                
            } catch (error) {
                log(`⚠️ Coordinate error: ${error.message}`);
            }
        }
        
        // Event handlers
        document.getElementById('search-btn').addEventListener('click', () => {
            testSearch();
        });
        
        document.getElementById('address-search').addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                testSearch();
            }
        });
        
        document.getElementById('my-location-btn').addEventListener('click', () => {
            testLocation();
        });
        
        log('🛰️ Debug page loaded. Navigation elements should be visible above.');
    </script>
</body>
</html>
